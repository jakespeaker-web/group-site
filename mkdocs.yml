site_name: 黄娟老师课题组
site_url: https://jakespeaker-web.github.io/group-site/

theme:
  name: material
  language: zh
  features:
    - navigation.tracking
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切换至深色模式
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切换至浅色模式

extra:
  generator: false

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  - pymdownx.caret

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

nav:
  - 首页: index.md
  - 组会纪要:
      - 2026-01-16: meetings/2026-01-16.md
      - 2026-01-30: meetings/2026-01-30.md
      - 2026-03-06: meetings/2026-03-06.md
      - 2026-03-13: meetings/2026-03-13.md
      - 2026-03-20: meetings/2026-03-20.md
  - 课题项目:
      - 项目总览: projects/index.md
  - 资料库: library/index.md