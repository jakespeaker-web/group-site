site_name: 黄娟老师课题组
site_url: https://jakespeaker-web.github.io/group-site/
# repo_url: https://github.com/username/repo
# repo_name: GitHub

theme:
  name: material
  language: zh
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.expand
    - navigation.top          # 新增：返回顶部按钮
    - search.suggest
    - search.highlight
    - content.code.copy       # 新增：代码块复制按钮
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切换至深色模式
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切换至浅色模式
extra:
  generator: false
markdown_extensions:
  - admonition
  - attr_list                 # 必选：用于处理 {.确定} 这种自定义样式
  - md_in_html
  - tables
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true
  # --- 以下为新增/修复图标与任务列表的关键插件 ---
  - pymdownx.emoji:           # 必选：处理 :material-xxx: 图标
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tasklist:        # 必选：处理 [x] 复选框
      custom_checkbox: true
  - pymdownx.tilde            # 可选：处理删除线
  - pymdownx.caret            # 可选：处理插入线/上标

extra_css:
  # # 注意：如果你不需要 Bootstrap 的特殊组件，建议删掉它，Material 本身的样式已经很漂亮了
  # - https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css
  - stylesheets/extra.css

extra_javascript:
  - javascripts/mathjax.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

nav:
  - 首页: index.md
  - 组会纪要:
      - 2026-01-16: meetings/2026-01-16.md
      - 2026-01-30: meetings/2026-01-30.md
      - 2026-03-06: meetings/2026-03-06.md
      - 2026-03-13: meetings/2026-03-13.md
  - 课题项目:
      - 项目总览: projects/index.md
  - 资料库: library/index.md

